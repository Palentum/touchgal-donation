services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: donation
      POSTGRES_USER: donation
      POSTGRES_PASSWORD: donation
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: ./services/api
    env_file: .env
    depends_on:
      - postgres
    volumes:
      - uploads_data:/data/uploads
    ports:
      - "8080:8080"

  web:
    build: ./apps/web
    env_file: .env
    environment:
      NUXT_API_INTERNAL_BASE: http://api:8080/api/v1
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  uploads_data:
